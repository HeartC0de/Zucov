name: FirstZucov

on: 
    push:
        branches:
        - main
        - dev
    pull_request:
        branches:
        - main
        - dev

env:
    DTN_VER : '9.0.x'


jobs:
    setup:
        runs-on: ubuntu-latest
        
        steps:
            - name: Get Code From Repos
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: ${{env.DTN_VER}}
            
            - name: Restore Dependencies
              run: dotnet restore
            
            - name: Upload restored packages
              uses: actions/upload-artifact@v4
              with:
                name: restored-packages
                path: |
                  /obj
                  /bin
                  ~/.nuget/packages
                if-no-files-found: warn

    build:
        runs-on: ubuntu-latest
        needs: setup
        
        steps:
            - name: Get Code From Repos
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: ${{env.DTN_VER}}
            
            - name: Download restored packages
              uses: actions/download-artifact@v4
              with:
                name: restored-packages
            
            - name: Build Solution
              run: dotnet build --no-restore --configuration Release

    test:
        runs-on: ubuntu-latest
        needs: build
        
        steps:
            - name: Get Code From Repos
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: ${{env.DTN_VER}}
            
            - name: Download restored packages
              uses: actions/download-artifact@v4
              with:
                name: restored-packages
            
            - name: Test
              run: dotnet test --no-build --configuration Release --verbosity normal