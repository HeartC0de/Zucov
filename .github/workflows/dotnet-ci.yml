name: FirstZucov

on: 
    push:
        branches:
        - main
        - dev
    pull_request:
        branches:
        - main
        - dev

env:
    DTN_VER : '9.0.x'


jobs:
    Setup_and_Dependencies:
        runs-on: ubuntu-latest
        
        steps:
            - name: Get Code From Repos
              uses: actions/checkout@v4

            - name: Setup .NET
              id: setup-dotnet
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: ${{env.DTN_VER}}
            
            - name: Restore Dependencies
              run: dotnet restore
            
            - name: Cache .NET installation
              uses: actions/cache@v3
              with:
                path: ~/.dotnet
                key: ${{ runner.os }}-dotnet-${{env.DTN_VER}}

    Build_Solution:
        runs-on: ubuntu-latest
        needs: setup
        
        steps:
            - name: Get Code From Repos
              uses: actions/checkout@v4

            - name: Restore .NET from cache
              uses: actions/cache@v3
              with:
                path: ~/.dotnet
                key: ${{ runner.os }}-dotnet-${{env.DTN_VER}}
            
            - name: Build Solution
              run: dotnet build --no-restore --configuration Release

    Test_Solution:
        runs-on: ubuntu-latest
        needs: build
        
        steps:
            - name: Get Code From Repos
              uses: actions/checkout@v4

            - name: Restore .NET from cache
              uses: actions/cache@v3
              with:
                path: ~/.dotnet
                key: ${{ runner.os }}-dotnet-${{env.DTN_VER}}
            
            - name: Test
              run: dotnet test --no-build --configuration Release --verbosity normal